name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy-frontend:
    name: Build & deploy Quasar SPA to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            FitBi.Quasar/package-lock.json
            package-lock.json

      - name: Install root linter dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: FitBi.Quasar

      - name: Build SPA
        run: npm run build
        working-directory: FitBi.Quasar
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_KEY: ${{ secrets.AZURE_FUNCTION_API_KEY }}
          VITE_DEFAULT_USER_ID: 1
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Create Vercel prebuilt output structure
        run: |
          mkdir -p FitBi.Quasar/.vercel/output/static
          cp -r FitBi.Quasar/dist/spa/. FitBi.Quasar/.vercel/output/static/
          cat > FitBi.Quasar/.vercel/output/config.json <<'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Link Vercel project
        run: |
          mkdir -p FitBi.Quasar/.vercel
          echo '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' \
            > FitBi.Quasar/.vercel/project.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: FitBi.Quasar
