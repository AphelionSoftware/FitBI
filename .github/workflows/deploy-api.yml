name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'FitAPI.Functions/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy-api:
    name: Publish & deploy Azure Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FitAPI.Functions/FitAPIFunctions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: fitapifunctions
          package: FitAPI.Functions/FitAPIFunctions/publish
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
